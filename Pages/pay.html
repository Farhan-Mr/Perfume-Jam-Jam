<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Perfume ~e~ Farhat</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/pay.css">
</head>
<body>
 
    <nav class="navbar navbar-expand-lg fixed-top checkout-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Perfume <span style="font-family: cursive;">~e~</span> <span style="font-family: cursive;">Farhat</span></a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                <a href="cart.html" class="text-decoration-none text-dark btn btn-sm btn-outline-dark">Back to Cart</a>
                <span class="text-muted small"><i class="bi bi-shield-lock-fill text-success me-1"></i> Secure 256-Bit SSL Checkout</span>
            </div>
        </div>
    </nav>

    <main class="container checkout-wrapper">
        <div class="row g-5">
            
            <div class="col-lg-7 order-2 order-lg-1">
                <div class="checkout-card p-4">
                    
                    <form id="perfumeCheckoutForm" class="needs-validation" novalidate>
                        
                        <h4 class="checkout-section-title mb-4"><i class="bi bi-truck me-2 text-gold"></i> Shipping Information</h4>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label custom-label">Full Name</label>
                                <!-- 1 -->
                                <input type="text" id="fullName" class="form-control custom-input" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label custom-label">Phone Number</label>
                                <!-- 2 -->
                                <input type="tel" id="phone" class="form-control custom-input" placeholder="+91 XXXXX XXXXX" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label custom-label">Email Address</label>
                                <!-- 3 -->
                                <input type="email" id="email" class="form-control custom-input" placeholder="john@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label custom-label">Flat / House No. / Street Address</label>
                                <!-- 4 -->
                               <input type="text" id="address" class="form-control custom-input" placeholder="Apartment, suite, unit, or landmark" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label custom-label">City</label>
                                <!-- 5 -->
                                <input type="text" id="city" class="form-control custom-input" placeholder="New Delhi" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label custom-label">Postal Code / PIN</label>
                                <!-- 6 -->
                                <input type="text" id="pincode" class="form-control custom-input" placeholder="110001" required>
                            </div>
                        </div>

                        <hr class="my-5 custom-divider">

                        <h4 class="checkout-section-title mb-4"><i class="bi bi-credit-card-2-front me-2 text-gold"></i> Payment Method</h4>
                        <div class="payment-gateway-wrapper d-grid gap-3 mb-4">
                            <div class="gateway-option p-3 border rounded" onclick="switchGateway('cod')">
                                <div class="form-check d-flex align-items-center">
                                    <input class="form-check-input me-3" type="radio" name="paymentMethod" id="pay-cod" checked>
                                    <label class="form-check-label w-100" for="pay-cod"><strong>Cash On Delivery (COD)</strong></label>
                                </div>
                            </div>
                            </div>

                        <button class="btn btn-finalize-order w-100 py-3 mt-4" type="submit">Complete Secure Purchase</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-5 order-1 order-lg-2">
                <div class="summary-card p-4 sticky-summary">
                    <h4 class="checkout-section-title mb-4"><i class="bi bi-bag-check me-2 text-gold"></i> Order Summary</h4>
                    
                    <div id="payment-summary" class="mb-4 p-3 border rounded bg-light">
                        <img id="pay-img" src="" style="width: 100px; border-radius: 5px;">
                        <h3 id="pay-name" class="h5 mt-2"></h3>
                        <p class="fw-bold">Total: <span id="pay-price"></span></p>
                    </div>

                    <div class="price-breakdown d-grid gap-2 pt-2">
                        <div class="d-flex justify-content-between align-items-center total-row pt-1">
                            <span class="fw-600 fs-5">Total Amount</span>
                            <span class="fw-700 fs-4 text-dark" id="pay-total-display"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow text-center p-4">
                <div class="modal-body">
                    <i class="bi bi-shield-check text-success" style="font-size: 4.5rem;"></i>
                    <h3 class="font-cinzel mt-2">Order Confirmed!</h3>
                    <a href="../index.html" class="btn btn-finalize-order w-100 py-2 mt-3">Back to Store</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        
        // Data Fetching Script
        
        window.onload = function() {
    // 1. SessionStorage se data uthayein
    const cart = JSON.parse(sessionStorage.getItem('checkoutData'));
    const total = sessionStorage.getItem('checkoutTotal');

    if (cart && total) {
        // Display Total Price
        document.getElementById('pay-price').innerText = total;
        document.getElementById('pay-total-display').innerText = total;

        // Products ka naam list karein
        const itemNames = cart.map(item => item.name).join(', ');
        document.getElementById('pay-name').innerText = itemNames;
        
        // Pehle item ki image dikha dein
        document.getElementById('pay-img').src = cart[0].img;
    } else {
        alert("Koi item select nahi hua!");
        window.location.href = "cart.html";
    }
}


        // Form handling
        const checkoutForm = document.getElementById('perfumeCheckoutForm');

        checkoutForm.addEventListener('submit', async function(event) {

    event.preventDefault();

    if (!checkoutForm.checkValidity()) {
        checkoutForm.classList.add('was-validated');
        return;
    }

    const cart =
        JSON.parse(sessionStorage.getItem('checkoutData'));

    const total =
        sessionStorage.getItem('checkoutTotal');

    const orderData = {

        name:
            document.getElementById('fullName').value,

        email:
            document.getElementById('email').value,

        phone:
            document.getElementById('phone').value,

        address:
            document.getElementById('address').value +
            ", " +
            document.getElementById('city').value +
            " - " +
            document.getElementById('pincode').value,

        productName:
            cart.map(item => item.name).join(', '),

        price: total
    };

    try {

        const response =
            await fetch('/place-order', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify(orderData)
            });

        const result =
            await response.json();

        if(result.success){

            sessionStorage.removeItem('checkoutData');
            sessionStorage.removeItem('checkoutTotal');

            var confirmationModal =
                new bootstrap.Modal(
                    document.getElementById('successModal')
                );

            confirmationModal.show();

        } else {

            alert(result.error || 'Order Failed');
        }

    } catch(error){

        console.error(error);

        alert('Server Error');
    }
});

        function switchGateway(gatewayType) 
        {
            document.getElementById('pay-cod').checked = (gatewayType === 'cod');
        document.getElementById('pay-stripe').checked = (gatewayType === 'stripe');
        document.getElementById('pay-razorpay').checked = (gatewayType === 'razorpay');
        document.getElementById('pay-paypal').checked = (gatewayType === 'paypal');

    // 2. Sabhi dynamic fields ko pehle 'd-none' (hide) kar do
        document.getElementById('stripe-fields').classList.add('d-none');
        document.getElementById('razorpay-fields').classList.add('d-none');
        document.getElementById('paypal-fields').classList.add('d-none');

    // 3. Sirf selected gateway ki fields ko show karo
        if(gatewayType !== 'cod') 
        {
            document.getElementById(`${gatewayType}-fields`).classList.remove('d-none');
        }
        }
    </script>
</body>
</html>
