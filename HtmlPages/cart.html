<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | Perfume ~e~ Farhat</title>
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="cart.css">
</head>
<body>
  
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top cart-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Perfume <span>~e~</span> Farhat</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <a href="../Collection Page/menn.html" class="btn btn-outline-dark btn-sm rounded-pill px-3"><i class="bi bi-arrow-left me-1"></i> Continue Shopping</a>
                <a href="dashboard.html" class="btn btn-outline-dark btn-sm rounded-pill px-3">Dashboard</a>
                <a href="login.html" class="btn btn-dark btn-sm rounded-pill px-3">Login</a>
            </div>
        </div>
    </nav>

    <!-- CART CONTAINER -->
    <main class="container cart-wrapper">
        <h2 class="cart-main-title mb-5">Shopping Bag<span>.</span></h2>
        
        <div class="row g-4 lg-g-5">
            <!-- LEFT: CART ITEMS DYNAMIC CONTAINER -->
            <div class="col-lg-8">
                <div class="cart-table-container p-4" id="cartDynamicContainer">
                    <!-- Dynamic Rows Will Inject Here From LocalStorage -->
                </div>
            </div>

            <!-- RIGHT: SUMMARY BLOCK & COUPON CODE -->
            <div class="col-lg-4">
                <!-- Promo Code Box -->
                <div class="cart-summary-card p-4 mb-4">
                    <h6 class="fw-600 mb-3 text-dark">Apply Promotional Coupon</h6>
                    <div class="input-group">
                        <input type="text" id="cartCoupon" class="form-control custom-cart-input shadow-none" placeholder="Coupon Code (FARHAT20)">
                        <button class="btn btn-apply-coupon font-cinzel px-4 btn-sm" onclick="applyCartPromo()">Apply</button>
                    </div>
                    <div id="couponAlert" class="small mt-2"></div>
                </div>

                <!-- Core Financial Totals -->
                <div class="cart-summary-card p-4">
                    <h4 class="summary-title pb-3 mb-4 text-dark">Order Summary</h4>
                    
                    <div class="d-grid gap-3 breakdown-rows">
                        <div class="d-flex justify-content-between text-muted">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="text-dark fw-600">₹0</span>
                        </div>
                        <div class="d-flex justify-content-between text-muted">
                            <span>Estimated Shipping</span>
                            <span class="text-success fw-600 tracking-wider small">FREE</span>
                        </div>
                        <div class="d-flex justify-content-between text-muted">
                            <span>GST / Tax (18%)</span>
                            <span id="cart-tax" class="text-dark fw-500">₹0.00</span>
                        </div>
                        <div class="d-flex justify-content-between text-muted d-none" id="cartPromoRow">
                            <span>Discount (20%)</span>
                            <span id="cartDiscountVal" class="text-danger fw-600">-₹0</span>
                        </div>
                        <hr class="my-2 border-slate">
                        <div class="d-flex justify-content-between align-items-center total-grand-row">
                            <span class="fw-600 fs-5 text-dark">Total</span>
                            <span id="cart-grand-total" class="fw-700 fs-3 text-dark">₹0.00</span>
                        </div>
                    </div>

                    <!-- PROCEED CTA -->
                    <button type="button" onclick="proceedToCheckout()" class="btn btn-proceed-checkout w-100 py-3 mt-4 text-center border-0">
                        Proceed To Checkout <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Dynamic Engine Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let isDiscountActive = false;
        let discountPercent = 0.20; // 20% off for FARHAT20

        // Page Load Engine
        document.addEventListener("DOMContentLoaded", () => {
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cartDynamicContainer');
            let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-bag-x text-muted" style="font-size: 3.5rem; opacity: 0.5;"></i>
                        <h4 class="mt-4 font-cinzel fw-700">Your Bag is Empty</h4>
                        <p class="text-muted small px-3">Aapne abhi tak koi luxury fragrance add nahi ki hai.</p>
                        <a href="../Collection Page/menn.html" class="btn btn-dark mt-3 rounded-pill px-4 btn-sm">Explore Fragrances</a>
                    </div>`;
                document.getElementById('cart-subtotal').innerText = "₹0";
                document.getElementById('cart-tax').innerText = "₹0.00";
                document.getElementById('cart-grand-total').innerText = "₹0.00";
                if(document.getElementById('cartPromoRow')) document.getElementById('cartPromoRow').classList.add('d-none');
                return;
            }

            // Generate Layout Header
            let html = `
                <div class="row d-none d-md-flex pb-3 border-bottom text-muted small fw-600 tracking-wider">
                    <div class="col-md-6">PRODUCT</div>
                    <div class="col-md-2 text-center">PRICE</div>
                    <div class="col-md-2 text-center">QUANTITY</div>
                    <div class="col-md-2 text-end">SUBTOTAL</div>
                </div>
            `;

            // Loop and render rows dynamically
            cart.forEach(item => {
                let rowSubtotal = item.price * item.qty;
                html += `
                    <div class="row align-items-center py-4 border-bottom cart-item" id="${item.id}" data-price="${item.price}">
                        <div class="col-md-6 col-12 mb-3 mb-md-0">
                            <div class="d-flex align-items-center gap-4">
                                <div class="cart-img-box">
                                    <img src="${item.img}" alt="${item.name}">
                                </div>
                                <div>
                                    <h5 class="cart-item-name m-0">${item.name}</h5>
                                    <span class="text-muted small d-block mt-1">Size: ${item.size}</span>
                                    <button class="btn btn-remove p-0 mt-2 small text-danger shadow-none" onclick="removeItem('${item.id}')">
                                        <i class="bi bi-trash3 me-1"></i> Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-2 col-4 text-md-center">
                            <span class="text-muted d-md-none d-inline small fw-bold">Price: </span>
                            <span class="fw-500">₹${item.price.toLocaleString('en-IN')}</span>
                        </div>
                        <div class="col-md-2 col-4 text-md-center">
                            <div class="qty-counter d-flex align-items-center justify-content-center">
                                <button onclick="updateQty('${item.id}', -1)">−</button>
                                <span id="${item.id}-qty" class="qty-val mx-2">${item.qty}</span>
                                <button onclick="updateQty('${item.id}', 1)">+</button>
                            </div>
                        </div>
                        <div class="col-md-2 col-4 text-end">
                            <span class="text-muted d-md-none d-inline small fw-bold">Total: </span>
                            <span id="${item.id}-subtotal" class="fw-600 row-subtotal text-dark">₹${rowSubtotal.toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            calculateCartTotals();
        }

        function updateQty(itemId, change) {
            let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];
            let item = cart.find(i => i.id === itemId);

            if (!item) return;

            item.qty += change;
            if (item.qty < 1) return;

            localStorage.setItem('perfumeCart', JSON.stringify(cart));
            
            // Fast UI Updates without full reload
            document.getElementById(`${itemId}-qty`).innerText = item.qty;
            let netRowSubtotal = item.price * item.qty;
            document.getElementById(`${itemId}-subtotal`).innerText = `₹${netRowSubtotal.toLocaleString('en-IN')}`;

            calculateCartTotals();
        }

        function removeItem(itemId) {
            const row = document.getElementById(itemId);
            row.style.opacity = '0';
            row.style.transform = 'translateY(15px)';
            
            setTimeout(() => {
                let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];
                cart = cart.filter(i => i.id !== itemId);
                localStorage.setItem('perfumeCart', JSON.stringify(cart));
                renderCart(); // Re-render state
            }, 300);
        }

        function calculateCartTotals() {
            let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];
            let pureSubtotal = 0;

            cart.forEach(item => {
                pureSubtotal += (item.price * item.qty);
            });

            let calculatedTax = pureSubtotal * 0.18;
            let discountAmount = isDiscountActive ? (pureSubtotal * discountPercent) : 0;
            let absoluteTotal = (pureSubtotal + calculatedTax) - discountAmount;

            document.getElementById('cart-subtotal').innerText = `₹${pureSubtotal.toLocaleString('en-IN')}`;
            document.getElementById('cart-tax').innerText = `₹${calculatedTax.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            if(isDiscountActive) {
                document.getElementById('cartDiscountVal').innerText = `-₹${discountAmount.toLocaleString('en-IN')}`;
            }
            
            document.getElementById('cart-grand-total').innerText = `₹${absoluteTotal.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        function applyCartPromo() {
            const inputVal = document.getElementById('cartCoupon').value.trim().toUpperCase();
            const alertBox = document.getElementById('couponAlert');
            const promoRow = document.getElementById('cartPromoRow');

            if(inputVal === 'FARHAT20') {
                isDiscountActive = true;
                if(promoRow) promoRow.classList.remove('d-none');
                alertBox.className = "small mt-2 text-success fw-500";
                alertBox.innerText = "✓ Coupon FARHAT20 verified successfully!";
                calculateCartTotals();
            } else {
                alertBox.className = "small mt-2 text-danger fw-500";
                alertBox.innerText = "✕ Invalid code. Use 'FARHAT20'.";
            }
        }
        function proceedToCheckout() {
    let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];
    
    if (cart.length === 0) {
        // Aap yaha alert ki jagah Bootstrap toast bhi use kar sakte hain
        alert("Aapka bag khali hai! Pehle kuch fragrances add karein.");
        return;
    }
    
    // Agar cart mein items hain, tabhi checkout page par le jayenge
    window.location.href = "checkout.html";
}






    </script>
</body>
</html>
