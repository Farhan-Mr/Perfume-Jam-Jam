<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Perfume ~e~ Farhat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}
 
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020b26,#081633,#1e2d48);
padding:20px;
flex-direction: column;
}

.navbar-top{
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    border-bottom: 1px solid rgba(212,175,55,0.2);
}

.navbar-top a{
    color: #d4af37;
    text-decoration: none;
    font-weight: 500;
}

.navbar-top a:hover{
    text-decoration: underline;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
margin-top: 100px;
}

h2{
text-align:center;
color:#fff;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,.08);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#d4af37;
font-size:16px;
font-weight:600;
cursor:pointer;
}

p{
text-align:center;
margin-top:15px;
color:white;
}

a{
color:#d4af37;
text-decoration:none;
}

</style>
</head>
<body>

<!-- Navigation Top Bar -->
<div class="navbar-top">
    <a href="../index.html" style="font-size: 18px;">← Back to Home</a>
    <div>
        <a href="../index.html" style="margin-right: 20px;">Home</a>
        <a href="login.html">Login</a>
    </div>
</div>

<div class="container">

<h2>Create Account</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="tel" placeholder="Phone Number">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button>Create Account</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>

</body>
</html>
